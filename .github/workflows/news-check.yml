name: News Check And Publish

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: andes-news-check
  cancel-in-progress: true

jobs:
  news-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update organized news artifacts
        run: npm run update-news

      - name: Fail on unexpected tracked file changes
        run: |
          CHANGED=$(git status --short --untracked-files=no | awk '{print $2}' | grep -v '^data/source-snapshots/' | grep -v '^data/update-drafts/' || true)
          if [ -n "${CHANGED}" ]; then
            echo "Unexpected tracked file changes from scheduled update-news run:"
            echo "${CHANGED}"
            exit 1
          fi

      - name: Upload audit artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: andes-news-check-artifacts
          path: |
            data/source-snapshots
            data/update-drafts

      - name: Commit and push news refresh
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          RUN_AT=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('data/source-snapshots/index.json','utf8'));process.stdout.write(j.lastCheckedAt||j.updatedAt||new Date().toISOString())")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source-snapshots data/update-drafts
          if git diff --cached --quiet; then
            echo "Generated files did not change."
            exit 0
          fi
          git commit -m "Automated news refresh ${RUN_AT}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:${GITHUB_REF_NAME}

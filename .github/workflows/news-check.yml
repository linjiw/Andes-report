name: News Check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  news-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate static data
        run: npm run validate

      - name: Check official sources
        run: npm run check-news

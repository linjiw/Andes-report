name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate
        run: npm run validate

      - name: Prepare static site
        run: |
          mkdir -p public
          cp index.html methodology.html sources.html history.html disclaimer.html styles.css app.js sync-status.js package.json public/
          mkdir -p public/data/source-snapshots
          mkdir -p public/data/framework-review
          cp data/incident-data.js data/events.csv data/sources.csv public/data/
          cp data/source-registry.json public/data/
          cp data/source-snapshots/index.js data/source-snapshots/latest.js public/data/source-snapshots/
          cp data/framework-review/latest.json data/framework-review/latest.md public/data/framework-review/
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
